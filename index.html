<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1b2838">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Zauberquiz">
  <title>Zauberquiz</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <section id="startScreen" class="screen screen-active" aria-labelledby="appTitle">
      <div class="brand-row">
        <span class="crest" aria-hidden="true">HP</span>
        <span id="offlineState" class="status-pill">Offline bereit</span>
      </div>

      <div class="hero-copy">
        <p class="eyebrow">Fan-Trivia</p>
        <h1 id="appTitle">Hauspokal Quiz</h1>
        <p class="intro">Sammle Punkte, wähle dein Fachgebiet und spiele schnelle Runden direkt auf dem iPhone.</p>
      </div>

      <div class="mode-grid" aria-label="Spielmodus">
        <button id="soloMode" class="mode-card mode-card-active" type="button" data-mode="solo">
          <span class="mode-icon" aria-hidden="true">
            <svg viewBox="0 0 48 48">
              <path d="M29 7l2.8 6.2L38 16l-6.2 2.8L29 25l-2.8-6.2L20 16l6.2-2.8L29 7Z"/>
              <path d="M16 28l14 14"/>
              <path d="M12 24l12 12"/>
              <path d="M18 22l8 8"/>
            </svg>
          </span>
          <span>Solo</span>
        </button>
        <button id="duelMode" class="mode-card" type="button" data-mode="duel">
          <span class="mode-icon" aria-hidden="true">
            <svg viewBox="0 0 48 48">
              <path d="M13 10l25 25"/>
              <path d="M35 10L10 35"/>
              <path d="M9 39l6-2 2-6"/>
              <path d="M39 39l-6-2-2-6"/>
              <path d="M24 7l2 4 4 2-4 2-2 4-2-4-4-2 4-2 2-4Z"/>
            </svg>
          </span>
          <span>Duell</span>
        </button>
        <button id="mysteryMode" class="mode-card" type="button" data-mode="mystery">
          <span class="mode-icon" aria-hidden="true">
            <svg viewBox="0 0 48 48">
              <circle cx="24" cy="20" r="12"/>
              <path d="M18 35h12"/>
              <path d="M15 41h18"/>
              <path d="M21.5 17a3 3 0 1 1 4.7 2.5c-1.4.9-2.2 1.7-2.2 3.5"/>
              <path d="M24 28h.1"/>
            </svg>
          </span>
          <span>Hinweise raten</span>
        </button>
      </div>

      <div class="stats-grid">
        <div>
          <span>Bestwert</span>
          <strong id="homeBest">0</strong>
        </div>
        <div>
          <span id="poolLabel">Fragen</span>
          <strong id="questionTotal">0</strong>
        </div>
      </div>

      <form id="setupForm" class="setup-form">
        <div id="duelFields" class="duel-fields" hidden>
          <div class="field-row">
            <label for="playerOne">Spieler 1</label>
            <input id="playerOne" name="playerOne" type="text" value="Spieler 1" autocomplete="off">
          </div>
          <div class="field-row">
            <label for="playerTwo">Spieler 2</label>
            <input id="playerTwo" name="playerTwo" type="text" value="Spieler 2" autocomplete="off">
          </div>
        </div>

        <div class="field-row">
          <label for="categorySelect">Kategorie</label>
          <select id="categorySelect" name="category"></select>
        </div>

        <div class="field-row">
          <label for="roundLength">Rundenlänge</label>
          <select id="roundLength" name="roundLength">
            <option value="5">5 Fragen</option>
            <option value="10" selected>10 Fragen</option>
            <option value="15">15 Fragen</option>
          </select>
        </div>

        <button class="primary-button" type="submit">Hauspokal starten</button>
      </form>
    </section>

    <section id="gameScreen" class="screen" aria-labelledby="questionText">
      <div class="game-topbar">
        <button id="quitButton" class="icon-button" type="button" aria-label="Zurück">‹</button>
        <div class="progress-wrap" aria-label="Fortschritt">
          <span id="progressLabel">Frage 1 von 10</span>
          <div class="progress-track">
            <div id="progressBar" class="progress-bar"></div>
          </div>
        </div>
        <div class="score-chip">
          <span id="scoreChipLabel">Punkte</span>
          <strong id="scoreLabel">0</strong>
        </div>
      </div>

      <div id="turnBanner" class="turn-banner" hidden></div>

      <div class="question-card">
        <div class="question-meta">
          <span id="categoryLabel">Kategorie</span>
          <span id="difficultyLabel">Mittel</span>
        </div>
        <h2 id="questionText">Frage</h2>
      </div>

      <div id="answers" class="answers" role="group" aria-label="Antworten"></div>

      <p id="feedback" class="feedback" aria-live="polite"></p>

      <button id="hintButton" class="secondary-button" type="button" hidden>Nächster Hinweis</button>
      <button id="nextButton" class="primary-button next-button" type="button" disabled>Nächste Frage</button>
    </section>

    <section id="resultScreen" class="screen" aria-labelledby="resultTitle">
      <div class="result-mark" aria-hidden="true">HP</div>
      <h2 id="resultTitle">Runde beendet</h2>
      <p id="resultText" class="intro"></p>

      <div class="stats-grid">
        <div>
          <span id="finalScoreLabel">Punkte</span>
          <strong id="finalScore">0</strong>
        </div>
        <div>
          <span id="finalCorrectLabel">Richtig</span>
          <strong id="finalCorrect">0</strong>
        </div>
      </div>

      <button id="playAgainButton" class="primary-button" type="button">Noch eine Runde</button>
    </section>
  </main>

  <script src="./questions.js"></script>
  <script src="./app.js"></script>
</body>
</html>
